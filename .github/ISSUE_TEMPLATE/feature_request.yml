name: Feature request
description: Suggest an improvement or new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What need does this feature address?
      placeholder: It is difficult to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any other approaches you considered.